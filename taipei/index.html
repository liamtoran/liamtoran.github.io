<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f6f4f0;--card:#fff;--ink:#1a1612;--mute:#8a7f72;--accent:#c49a6c;--border:#e5dfd6}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.hero{background:var(--ink);color:var(--bg);padding:48px 24px 36px;text-align:center}
.hero h1{font-family:'Instrument Serif',serif;font-size:clamp(28px,5vw,42px);font-weight:400;margin-bottom:4px}
.hero p{font-size:12px;opacity:.5;letter-spacing:3px;text-transform:uppercase}
.nav{display:flex;gap:5px;padding:12px 14px;background:#eae6df;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{padding:7px 14px;border:1px solid #ccc5b8;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);white-space:nowrap;transition:all .15s;font-family:inherit;color:var(--ink)}
.nb:hover{background:#e8e3da}
.nb.on{color:var(--bg);border-color:var(--ink)}
.pn{display:none;max-width:920px;margin:0 auto;padding:24px 18px 50px}
.pn.on{display:block}
/* Day header */
.dh{border-radius:14px;padding:24px;margin-bottom:18px;color:#fff;position:relative;overflow:hidden}
.dh h2{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400}
.dh .sub{font-size:12px;opacity:.8;margin-top:2px}
.dh .meta{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;font-size:12px;opacity:.9}
.dh .meta b{font-weight:600;opacity:.7;font-size:10px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px}
/* Map */
.mw{border-radius:12px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.mw .map{height:320px;width:100%}
/* Timeline */
.tl{position:relative;padding-left:28px;margin-bottom:18px}
.tl::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.ti{position:relative;margin-bottom:12px}
.ti::before{content:'';position:absolute;left:-22px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--card)}
.ti.meal::before{background:#e67e22;border-color:#e67e22}
.ti.alert::before{background:#e74c3c;border-color:#e74c3c}
.ti.transit::before{background:var(--mute);border-color:var(--mute)}
.ti.hood::before{background:var(--accent);border-color:var(--accent)}
.ti-time{font-size:11px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.5px}
.ti-label{font-weight:700;font-size:14px;margin:2px 0}
.ti-detail{font-size:12.5px;color:#5a554e;line-height:1.5}
/* Expandable hood spots */
.hood-expand{background:var(--card);border-radius:10px;margin:8px 0;border:1px solid var(--border);overflow:hidden}
.hood-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--accent)}
.hood-toggle:hover{background:#faf8f5}
.hood-toggle .arr{transition:transform .2s}
.hood-spots{display:none;padding:6px 10px 10px;border-top:1px solid var(--border)}
.hood-spots.open{display:block}
.sp{display:flex;gap:10px;align-items:flex-start;padding:8px 6px;border-radius:8px;text-decoration:none;color:inherit;transition:background .1s}
.sp:hover{background:#f8f5f0}
.sp-pin{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:#fff}
.sp-body{flex:1;min-width:0}
.sp-name{font-weight:600;font-size:12.5px}
.sp-type{font-size:10.5px;color:var(--mute)}
.sp-addr{font-size:11px;color:#6a635a}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:5px;font-weight:600;margin-left:4px}
.tag-it{background:var(--accent);color:#fff}
/* Notes box */
.notes{background:var(--card);border-radius:10px;padding:16px 18px;margin-bottom:18px;border-left:3px solid var(--accent);font-size:12.5px;line-height:1.7;color:#4a4440;white-space:pre-line}
.notes h4{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:8px}
@media(max-width:640px){
  .hero{padding:32px 16px 24px}
  .pn{padding:16px 12px 40px}
  .dh{padding:18px}
  .tl{padding-left:24px}
}
</style>
</head>

const MEALS={"day1": [{"label": "🍜 Lunch: Ximending eats", "ll": [25.0425, 121.5065], "type": "lunch"}, {"label": "🍜 Dinner: Ningxia Night Mkt", "ll": [25.0554, 121.5155], "type": "dinner"}], "day2": [{"label": "🍣 Lunch: Yóu Sushi", "ll": [25.031, 121.5291], "type": "lunch"}, {"label": "🍢 Dinner: Raohe Night Mkt", "ll": [25.0509, 121.5775], "type": "dinner"}], "day3": [{"label": "🍜 Lunch: 山城創作坊 / Jiufen", "ll": [25.1088, 121.8448], "type": "lunch"}, {"label": "🍣 Dinner: 鮨群 omakase", "ll": [25.0548, 121.523], "type": "dinner"}], "day4": [{"label": "🥟 Lunch: Chung Chia Sheng Jian Bao", "ll": [25.0875, 121.524], "type": "lunch"}, {"label": "🍽️ Dinner: Wellspring hotel", "ll": [25.137, 121.5065], "type": "dinner"}], "day5": []};
const HOTELS={"day1": [{"label": "🏨 Humble Boutique Hotel", "ll": [25.0522, 121.5329], "note": "wake up + sleep"}], "day2": [{"label": "🏨 Humble Boutique Hotel", "ll": [25.0522, 121.5329], "note": "wake up + sleep"}], "day3": [{"label": "🏨 Humble Boutique Hotel", "ll": [25.0522, 121.5329], "note": "wake up + sleep"}], "day4": [{"label": "🏨 wake up: Humble Boutique", "ll": [25.0522, 121.5329], "note": "checkout AM"}, {"label": "🏨 sleep: Wellspring by Silks", "ll": [25.137, 121.5065], "note": "check in PM"}], "day5": [{"label": "🏨 Wellspring by Silks", "ll": [25.137, 121.5065], "note": "checkout AM"}]};
function ge(t){if(!t)return'\ud83d\udccd';t=t.toLowerCase();for(const[k,e]of Object.entries(TE)){if(t.includes(k))return e}return'\ud83d\udccd'}

const maps={};
function build(){
  const nav=document.getElementById('nav');
  const panels=document.getElementById('panels');

  DAYS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='nb'+(i===0?' on':'');
    btn.style.cssText=i===0?'background:'+d.color+';color:#fff;border-color:'+d.color:'';
    btn.innerHTML='Day '+(i+1)+'<span style="opacity:.6;margin-left:3px;font-weight:400;font-size:10px">'+d.date.split(' ').slice(0,2).join(' ')+'</span>';
    btn.dataset.i=i;
    btn.onclick=()=>{
      document.querySelectorAll('.nb').forEach((b,j)=>{
        b.classList.toggle('on',j==i);
        b.style.cssText=j==i?'background:'+DAYS[j].color+';color:#fff;border-color:'+DAYS[j].color:'';
      });
      document.querySelectorAll('.pn').forEach((p,j)=>p.classList.toggle('on',j==i));
      setTimeout(()=>{if(typeof L!=='undefined')initMap(d.id)},200);
    };
    nav.appendChild(btn);

    const pn=document.createElement('div');
    pn.className='pn'+(i===0?' on':'');

    let h='';
    // Day header
    h+=`<div class="dh" style="background:${d.color}">
      <h2>Day ${i+1}: ${d.title}</h2>
      <div class="sub">${d.date}</div>
      <div class="meta">
        <div><b>Breakfast</b><a href="https://www.google.com/maps/search/${encodeURIComponent((d.breakfast||'').split('(')[0].split('\\n')[0])}" target="_blank" style="color:inherit;text-decoration:underline dotted;text-underline-offset:2px">${d.breakfast||'—'}</a></div>
        <div><b>Sleeping</b><a href="https://www.google.com/maps/search/${encodeURIComponent(d.lodging)}" target="_blank" style="color:inherit;text-decoration:underline dotted;text-underline-offset:2px">${d.lodging}</a></div>
      </div>
    </div>`;

    // Map
    h+=`<div class="mw"><div class="map" id="map-${d.id}" style="height:320px;width:100%;min-height:320px"></div></div>`;

    // Timeline
    h+='<div class="tl">';
    d.timeline.forEach(t=>{
      const cls=t.type||'';
      const searchName=t.label.replace(/^[🍣🥟🍜🍢🍽️✈️🔴]+\s*/,'').replace(/^(Lunch|Dinner|Breakfast):\s*/i,'');
      const mapsLink=t.type==='meal'||t.type==='hood'?`https://www.google.com/maps/search/${encodeURIComponent(searchName+' Taipei')}`:'';
      h+=`<div class="ti ${cls}">
        <div class="ti-time">${t.time}</div>
        <div class="ti-label">${mapsLink?`<a href="${mapsLink}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted rgba(0,0,0,.3)">${t.label}</a>`:t.label}</div>
        ${t.detail?'<div class="ti-detail">'+t.detail+'</div>':''}`;

      // If it's a hood type, add expandable spots
      if(t.type==='hood' && t.hood && ORDERED[t.hood]){
        const clusters=ORDERED[t.hood];
        const ci=t.cluster!==undefined?t.cluster:null;
        const showClusters=ci!==null?[clusters[ci]]:clusters;
        showClusters.forEach((cl,idx)=>{
          const [label,desc,titles]=cl;
          const spotCount=titles.length;
          const uid=d.id+'-'+t.hood+'-'+idx;
          h+=`<div class="hood-expand">
            <div class="hood-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.arr').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(90deg)':''">
              📍 ${label} · ${spotCount} spots <span class="arr">▸</span>
            </div>
            <div class="hood-spots" id="${uid}">`;
          titles.forEach((s,j)=>{
            const spot=s;
            const isIt=ITIN.has(spot.t);
            const url=spot.u||('https://www.google.com/maps/search/'+encodeURIComponent(spot.t+' Taipei'));
            h+=`<a class="sp" href="${url}" target="_blank">
              <div class="sp-pin" style="background:${isIt?d.color:'#bbb'}">${j+1}</div>
              <div class="sp-body">
                <div class="sp-name">${spot.t}${isIt?'<span class="tag tag-it">planned</span>':''}</div>
                <div class="sp-type">${ge(spot.y)} ${spot.y||''}</div>
                ${spot.a?'<div class="sp-addr">'+spot.a+'</div>':''}
              </div>
            </a>`;
          });
          h+=`</div></div>`;
        });
      }
      h+='</div>';
    });
    h+='</div>';

    // Notes
    if(d.notes){
      h+=`<div class="notes"><h4>Notes & Tips</h4>${d.notes}</div>`;
    }

    // All neighborhood spots for this day (not on timeline)
    const otherHoods=d.hoods.filter(hood=>{
      // Check if any timeline item references this hood
      return !d.timeline.some(t=>t.hood===hood);
    });
    otherHoods.forEach(hood=>{
      if(!ORDERED[hood])return;
      ORDERED[hood].forEach((cl,idx)=>{
        const [label,desc,titles]=cl;
        if(!titles.length)return;
        const uid=d.id+'-other-'+hood+'-'+idx;
        h+=`<div class="hood-expand">
          <div class="hood-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.arr').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(90deg)':''">
            Also nearby: ${hood} · ${label} · ${titles.length} spots <span class="arr">▸</span>
          </div>
          <div class="hood-spots" id="${uid}">`;
        titles.forEach((s,j)=>{
          const spot=s;
          const isIt=ITIN.has(spot.t);
          const url=spot.u||('#');
          h+=`<a class="sp" href="${url}" target="_blank">
            <div class="sp-pin" style="background:${isIt?d.color:'#bbb'}">${j+1}</div>
            <div class="sp-body">
              <div class="sp-name">${spot.t}${isIt?'<span class="tag tag-it">planned</span>':''}</div>
              <div class="sp-type">${ge(spot.y)} ${spot.y||''}</div>
            </div>
          </a>`;
        });
        h+=`</div></div>`;
      });
    });

    pn.innerHTML=h;
    panels.appendChild(pn);
  });
}

function initMap(dayId){
  if(maps[dayId])return maps[dayId].invalidateSize();
  const d=DAYS.find(x=>x.id===dayId);
  if(!d)return;
  const el=document.getElementById('map-'+dayId);
  if(!el)return;
  let allSpots=[];
  d.hoods.forEach(hood=>{
    if(!ORDERED[hood])return;
    ORDERED[hood].forEach(cl=>{
      cl[2].forEach(s=>{if(s.l)allSpots.push({...s})});
    });
  });
  if(!allSpots.length)return;
  const avgLat=allSpots.reduce((a,s)=>a+s.l[0],0)/allSpots.length;
  const avgLng=allSpots.reduce((a,s)=>a+s.l[1],0)/allSpots.length;
  const zoom=d.hoods.length>2?13:d.hoods.includes('Ruifang')?15:d.hoods.includes('Yingge')?11:14;
  const map=L.map(el).setView([avgLat,avgLng],zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'\u00a9 OSM \u00a9 CARTO',maxZoom:19}).addTo(map);
  allSpots.forEach((s,j)=>{
    const isIt=ITIN.has(s.t);
    const sz=isIt?26:20;
    const bg=isIt?d.color:'#999';
    const icon=L.divIcon({
      className:'',
      html:`<div style="background:${bg};color:#fff;width:${sz}px;height:${sz}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${isIt?11:9}px;font-weight:700;font-family:DM Sans,sans-serif;box-shadow:0 2px 5px rgba(0,0,0,.3);border:2px solid #fff">${j+1}</div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
    });
    L.marker(s.l,{icon}).addTo(map).bindPopup(`<b>${s.t}</b><br><small>${s.y||''}</small>`);
  });
  // Add meal markers
  const dayMeals=MEALS[dayId]||[];
  dayMeals.forEach(m=>{
    const col=m.type==='lunch'?'#e67e22':'#8e44ad';
    const emoji=m.type==='lunch'?'L':'D';
    const mIcon=L.divIcon({
      className:'',
      html:`<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))"><div style="background:${col};color:#fff;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700;font-family:DM Sans,sans-serif;white-space:nowrap;border:2px solid #fff">${m.label}</div><div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid ${col};margin-top:-1px"></div></div>`,
      iconSize:[0,0],iconAnchor:[0,36]
    });
    L.marker(m.ll,{icon:mIcon,zIndexOffset:1000}).addTo(map).bindPopup(`<b>${m.label}</b>`);
  });
  // Add hotel markers
  const dayHotels=HOTELS[dayId]||[];
  dayHotels.forEach(h=>{
    const hIcon=L.divIcon({
      className:'',
      html:'<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))"><div style=\"background:#1a1612;color:#fff;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;font-family:DM Sans,sans-serif;white-space:nowrap;border:2px solid #c49a6c\">'+h.label+'</div><div style=\"width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #1a1612;margin-top:-1px\"></div></div>',
      iconSize:[0,0],iconAnchor:[0,36]
    });
    L.marker(h.ll,{icon:hIcon,zIndexOffset:2000}).addTo(map).bindPopup('<b>'+h.label+'</b><br><small>'+h.note+'</small>');
  });
  maps[dayId]=map;
}

document.addEventListener('DOMContentLoaded',()=>{
  build();
  function tryInit(){
    if(typeof L!=='undefined'&&L.map){initMap('day1')}
    else{setTimeout(tryInit,200)}
  }
  setTimeout(tryInit,500);
});
</script>
</body>
